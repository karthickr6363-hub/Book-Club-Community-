<!DOCTYPE html>
<html lang="en">

<head>
	<title>Register - BookSaw - Free Book Store HTML CSS Template</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="format-detection" content="telephone=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="author" content="">
	<meta name="keywords" content="">
	<meta name="description" content="">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

	<link rel="stylesheet" type="text/css" href="css/normalize.css">
	<link rel="stylesheet" type="text/css" href="icomoon/icomoon.css">
	<link rel="stylesheet" type="text/css" href="css/vendor.css">
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/png" href="images/main-logo.png">

</head>

<body>

	<section id="register-section" class="py-5 my-5">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-5">
					<div class="register-form" style="margin-top: -60px;">
						<div class="main-logo text-center">
							<a href="index.html"><img src="images/main-logo.png" alt="logo"></a>
						</div>
						<div class="section-header align-center">
							<h2 class="section-title">Create Your Account</h2>
							<p>Join our book community and discover your next favorite read</p>
						</div>

						<form id="register-form">
							<div class="row">
								<div class="col-md-6 mb-3">
									<label for="firstName" class="form-label">First Name</label>
									<input type="text" class="form-control" id="firstName" name="firstName"
										placeholder="Enter your first name" required>
								</div>

								<div class="col-md-6 mb-3">
									<label for="lastName" class="form-label">Last Name</label>
									<input type="text" class="form-control" id="lastName" name="lastName"
										placeholder="Enter your last name" required>
								</div>
							</div>

							<div class="mb-3">
								<label for="email" class="form-label">Email Address</label>
								<input type="email" class="form-control" id="email" name="email"
									placeholder="Enter your email address" required>
							</div>

							<div class="mb-3">
								<label for="phone" class="form-label">Phone Number</label>
								<input type="tel" class="form-control" id="phone" name="phone"
									placeholder="Enter your phone number">
							</div>

							<div class="row">
								<div class="col-md-6 mb-3">
									<label for="password" class="form-label">Password</label>
									<input type="password" class="form-control" id="password" name="password"
										placeholder="Create a password" required>
								</div>

								<div class="col-md-6 mb-3">
									<label for="confirmPassword" class="form-label">Confirm Password</label>
									<input type="password" class="form-control" id="confirmPassword"
										name="confirmPassword" placeholder="Confirm your password" required>
								</div>
							</div>

							<div class="mb-3 form-check">
								<input type="checkbox" class="form-check-input" id="terms" name="terms" required>
								<label class="form-check-label" for="terms">
									I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy
										Policy</a>
								</label>
							</div>

							<div class="mb-3">
								<button type="submit" class="btn btn-accent btn-full">Create Account</button>
							</div>

							<div class="text-center">
								<p>Already have an account? <a href="login.html">Login here</a></p>
							</div>
						</form>

						<div class="social-login mt-4">
							<div class="text-center mb-3">
								<p>Or register with</p>
							</div>
							<div class="d-flex justify-content-center gap-3">
								<button type="button" class="btn btn-outline-primary social-btn">
									<i class="fab fa-google"></i> Google
								</button>
								<button type="button" class="btn btn-outline-primary social-btn">
									<i class="fab fa-facebook-f"></i> Facebook
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
		crossorigin="anonymous"></script>
	<script src="js/jquery-3.6.0.min.js"></script>
	<script src="js/plugins.js"></script>
	<script src="js/main.js"></script>

	<script>
		document.getElementById('register-form').addEventListener('submit', function (e) {
			e.preventDefault();

			// Get form values
			const firstName = document.getElementById('firstName').value;
			const lastName = document.getElementById('lastName').value;
			const email = document.getElementById('email').value;
			const phone = document.getElementById('phone').value;
			const password = document.getElementById('password').value;
			const confirmPassword = document.getElementById('confirmPassword').value;
			const terms = document.getElementById('terms').checked;

			// Simple validation
			if (!firstName || !lastName || !email || !password || !confirmPassword) {
				alert('Please fill in all required fields');
				return;
			}

			if (password !== confirmPassword) {
				alert('Passwords do not match');
				return;
			}

			if (password.length < 6) {
				alert('Password must be at least 6 characters long');
				return;
			}

			if (!terms) {
				alert('Please agree to the terms and conditions');
				return;
			}

			// Success message
			alert('Registration successful! Please login to continue.');
			// Redirect to login page
			window.location.href = 'login.html';
		});
	</script>

</body>

</html>
