<!DOCTYPE html>
<html lang="en">

<head>
	<title>Login - BookSaw - Free Book Store HTML CSS Template</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="format-detection" content="telephone=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="author" content="">
	<meta name="keywords" content="">
	<meta name="description" content="">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

	<link rel="stylesheet" type="text/css" href="css/normalize.css">
	<link rel="stylesheet" type="text/css" href="icomoon/icomoon.css">
	<link rel="stylesheet" type="text/css" href="css/vendor.css">
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/png" href="images/main-logo.png">

</head>

<body>

	<section id="login-section" class="py-5 my-5">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-4">
					<div class="login-form" style="margin-top: -60px;">
						<div class="main-logo text-center">
							<a href="index.html"><img src="images/main-logo.png" alt="logo"></a>
						</div>

						<div class="section-header align-center">
							<h2 class="section-title">Login to Your Account</h2>
							<p>Enter your credentials to access your account</p>
						</div>

						<form id="login-form">
							<div class="mb-3">
								<label for="email" class="form-label">Email Address</label>
								<input type="email" class="form-control" id="email" name="email"
									placeholder="Enter your email" required>
							</div>

							<div class="mb-3">
								<label for="password" class="form-label">Password</label>
								<input type="password" class="form-control" id="password" name="password"
									placeholder="Enter your password" required>
							</div>

							<div class="mb-3 form-check">
								<input type="checkbox" class="form-check-input" id="remember" name="remember">
								<label class="form-check-label" for="remember">Remember me</label>
							</div>

							<div class="mb-3">
								<button type="submit" class="btn btn-accent btn-full">Login</button>
							</div>

							<div class="text-center">
								<p>Don't have an account? <a href="register.html">Register here</a></p>
								<p><a href="#" class="text-muted">Forgot your password?</a></p>
							</div>
						</form>

						<div class="social-login mt-4">
							<div class="text-center mb-3">
								<p>Or login with</p>
							</div>
							<div class="d-flex justify-content-center gap-3">
								<button type="button" class="btn btn-outline-primary social-btn">
									<i class="fab fa-google"></i> Google
								</button>
								<button type="button" class="btn btn-outline-primary social-btn">
									<i class="fab fa-facebook-f"></i> Facebook
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
		crossorigin="anonymous"></script>
	<script src="js/jquery-3.6.0.min.js"></script>
	<script src="js/plugins.js"></script>
	<script src="js/main.js"></script>

	<script>
		document.getElementById('login-form').addEventListener('submit', function (e) {
			e.preventDefault();
			// Simple form validation
			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;

			if (email && password) {
				alert('Login successful! (This is a demo - actual authentication not implemented)');
				// Redirect to home page
				window.location.href = 'index.html';
			} else {
				alert('Please fill in all fields');
			}
		});
	</script>

</body>

</html>
